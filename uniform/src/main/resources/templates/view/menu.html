<!--メニュー画面(会員・管理者)-->
<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>MENU</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
	<!-- ブラウザ全体 -->
	<div>
		<!--ヘッダー部分  -->
		<header th:insert="~{common/header :: header}"></header>


		<!--会員メニュー画面-->
		<tbody th:if="${user.authority.equals('2')}">
			<!-- ブラウザ全体 -->
			<div id="nomal">


				<!-- メニュー部分 -->
				<div id="menu">
					<!-- ページタイトル -->
					<div id="page_title">
						<h2>●会員メニュー●</h2>
					</div>
				</div>

				<!-- menuのコンテンツ部分 -->
				<div id="main" class="container">
					<a href="/listItem" class="button">商品一覧</a><br><br>
					<a href="/orderHistory" class="button">注文履歴</a><br><br>
					<a th:href="@{/changeInfo(userid=${user.userid})}" class="button">登録情報修正</a><br><br>
					<a href="/logout" class="button">ログアウト</a><br>
					<br>
					<br>
					<br>
				</div>

			</div>
		</tbody>

		<!--管理者メニュー画面-->
		<tbody th:if="${user.authority.equals('1')}">
			<!-- ブラウザ全体 -->
			<div id="wrap">

				<!-- メニュー部分 -->
				<div id="menu">
					<div class="container">
						<!-- ページタイトル -->
						<div id="page_title">
							<h2>●管理者メニュー●</h2>
						</div>
					</div>
				</div>

				<!-- menuのコンテンツ部分 -->
				<div id="main" class="container">
					<a href="/listOrder" class="button">受注状況確認</a><br><br>
					<a href="/listItem" class="button">商品管理</a><br><br>
					<a href="/insertItem" class="button">商品追加</a><br><br>
					<a href="/listUser" class="button">ユーザー一覧</a><br><br>
					<a href="/logout" class="button">ログアウト</a><br><br>
				</div>




			</div>
		</tbody>
		<!-- フッター部分 -->
		<footer th:insert="~{common/footer :: footer}"></footer>

</html>
